name: Build and push image

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: api-image-${{ github.ref }}
  cancel-in-progress: true

env:
  ACR_NAME: ${{ vars.ACR_NAME || 'byltexacr' }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER || format('{0}.azurecr.io', vars.ACR_NAME || 'byltexacr') }}
  IMAGE_NAME: api
  INFRA_REPO: ${{ vars.INFRA_REPO || 'ByltEx/infra' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR access token
        id: acr
        run: |
          TOKEN="$(az acr login --name "${ACR_NAME}" --expose-token --output tsv --query accessToken)"
          echo "token=${TOKEN}" >> "${GITHUB_OUTPUT}"
        env:
          ACR_NAME: ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: 00000000-0000-0000-0000-000000000000
          password: ${{ steps.acr.outputs.token }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout infra
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v6
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          path: infra

      - name: Update Flux deployment image
        if: github.event_name != 'pull_request'
        run: |
          DEPLOYMENT="infra/clusters/byltex/api/deployment.yaml"
          IMAGE="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${GITHUB_SHA}"
          sed -i "s|image: ${ACR_LOGIN_SERVER}/${IMAGE_NAME}:.*|image: ${IMAGE}|" "${DEPLOYMENT}"
        env:
          ACR_LOGIN_SERVER: ${{ env.ACR_LOGIN_SERVER }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Commit and push infra
        if: github.event_name != 'pull_request'
        working-directory: infra
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clusters/byltex/api/deployment.yaml
          if ! git diff --staged --quiet; then
            git commit -m "deploy(api): ${GITHUB_SHA}"
            git push
          fi
        env:
          GITHUB_SHA: ${{ github.sha }}
